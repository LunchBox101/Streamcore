spring.application.name=StreamCore

server.port=8080

# WebSocket buffer sizes (important for video frames which can be large)
# 10MB max binary message size — tune based on your frame sizes
spring.websocket.max-binary-message-buffer-size=10485760
spring.websocket.max-text-message-buffer-size=65536

# Actuator — expose health + info endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.streamcore=DEBUG
logging.level.org.springframework.web.socket=INFO
